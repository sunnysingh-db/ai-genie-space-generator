# ── Genie Space ────────────────────────────────────────────────────────
genie_space_name: "Airline Operations & Booking Analytics"

# ── AI Model ───────────────────────────────────────────────────────────
llm_model: databricks-claude-sonnet-4-6

# ============================================================
# Business Context (auto-generated from table analysis)
# ============================================================

# Q1: What does your business do?
business_domain: "International airline group managing flight operations, passenger bookings, and loyalty programs across 15+ carriers serving 20 major airports worldwide."

# Q2: What data is tracked in these tables?
data_description: "Flight schedules with delay and occupancy tracking, passenger bookings with fare breakdowns and cabin class details, airline profiles including fleet size and alliance membership, airport infrastructure data, and passenger loyalty program tiers with lifetime miles history."

# Q3: Who uses this data and what decisions do they make?
stakeholders_and_decisions: "Revenue managers analyse fare trends and cabin class mix; operations teams monitor delays, cancellations, and seat occupancy; marketing targets loyalty tiers and booking channels; network planners evaluate route performance and airline partnerships."

# Q4: Any other important context? (optional)
additional_context: "Flights span September 2025 to February 2026; bookings from July 2025 to February 2026. Cabin classes include Economy, Premium Economy, Business, and First. Bookings link to passengers and flights. Alliances are Oneworld, SkyTeam, and Star Alliance. Flight statuses: Completed, Delayed, Cancelled. Loyalty tiers: Bronze, Silver, Gold, Platinum."

# ============================================================
# Sample Questions (auto-generated)
# ============================================================
sample_questions:
  - "What is the total booking revenue broken down by cabin class?"
  - "Which airlines have the highest average flight delay in minutes?"
  - "How does seat occupancy rate vary by aircraft type?"
  - "What are the monthly booking trends over the past six months?"
  - "Which booking channels generate the most revenue?"
  - "What is the cancellation rate by airline and how does it compare across alliances?"
  - "Which routes have the highest average fares?"
  - "How does loyalty tier distribution differ across nationalities?"
  - "What percentage of passengers purchase wifi or select meal options by cabin class?"
  - "Which hub airports handle the most departing flights and what is their average delay?"

