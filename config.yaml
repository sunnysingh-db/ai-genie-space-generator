# ============================================================
# Business Context Questionnaire
# ============================================================
# Answer each question in 1 sentence. The AI uses your answers
# to select the right tables and generate relevant metrics.
# ============================================================

# Q1: What does your business do?
business_domain: "Global aviation analytics covering 20 airports across 6 regions (North America, Europe, Asia, Middle East, Oceania, South America) with 15 airlines operating 380 routes in 14 countries."

# Q2: What data is tracked in these tables?
data_description: "Airport facilities (codes, gates, regions), airline profiles (alliances, fleet sizes), scheduled flights (departure/arrival times, delays, occupancy rates, aircraft types), 800 passenger profiles (frequent flyer tiers, miles flown, demographics), and 5,000 ticket bookings (4 cabin classes, 5 booking channels, fares, taxes, ancillaries like bags/meals/wifi)."

# Q3: Who uses this data and what decisions do they make?
stakeholders_and_decisions: "Operations teams monitor flight delays (avg 15 min) and cancellation rates (10%) to improve on-time performance; revenue management analyzes $12.7M in booking revenue across Economy, Premium Economy, Business, and First cabins to optimize fare pricing; and loyalty teams track Platinum/Gold/Silver/Bronze frequent flyer tiers to drive engagement and retention."

# Q4: Any other important context? (optional)
additional_context: "Flights span Sep 2025 to Feb 2026 with 2,500 records; bookings span Jul 2025 to Feb 2026; airlines belong to Star Alliance (7), Oneworld (3), SkyTeam (3), or are unaffiliated (2); average occupancy is 76.3%; booking channels include Website, Mobile App, Airport Kiosk, Travel Agent, and Call Center; payment methods include Credit Card, Debit Card, PayPal, Wire Transfer, and Miles Redemption."

# ============================================================
# Sample Questions
# ============================================================
# What questions does your team actually ask?
# The AI uses these to decide which metrics and dimensions to create.
# ============================================================
sample_questions:
  - "What is the average flight delay in minutes by airline and how does it vary by month?"
  - "Which routes have the highest occupancy rates and what are their average fares?"
  - "Show total booking revenue by cabin class, split by First, Business, Premium Economy, and Economy."
  - "What percentage of flights were Delayed, Cancelled, or Completed each month from Sep 2025 to Feb 2026?"
  - "Who are the top 10 passengers by total miles flown and what are their frequent flyer tiers?"
  - "What is the booking volume trend by channel (Website, Mobile App, Travel Agent, Airport Kiosk, Call Center) over time?"
  - "Which airports handle the most departing flights and what is their average delay?"
  - "How does average fare compare across Star Alliance, Oneworld, SkyTeam, and unaffiliated airlines?"
  - "What is the No-Show and Cancellation rate by booking channel and cabin class?"
  - "What is the ancillary attach rate for checked bags, meals, and wifi by cabin class?"