# Sample Questions (auto-generated)
# ============================================================
sample_questions:
  - "What percentage of job runs succeeded versus failed over the past 30 days?"
  - "Which jobs have the highest failure rate and what are the most common reasons they fail?"
  - "How has the average time jobs spend waiting in the queue changed over the past month?"
  - "Which workspaces are running the most jobs and which ones have the most failures?"
  - "What are the top 10 longest-running jobs on average, and how much time do they spend on setup versus actual execution?"
