# Q1: What does your business do?
business_domain: "Databricks platform operations tracking automated data pipeline jobs and task executions across multiple workspaces, supporting engineering and analytics teams running scheduled, continuous, and event-triggered workflows."

# Q2: What data is tracked in these tables?
data_description: "Automated job definitions with scheduling details, ownership, and tags; individual job run history with start and end times, success or failure outcomes, and how long each phase took; task-level breakdowns within each run including dependencies and error reasons."

# Q3: Who uses this data and what decisions do they make?
stakeholders_and_decisions: "Engineering leads monitor job reliability and failure rates; platform teams investigate slow or queued runs; operations managers track which workspaces consume the most compute; data teams identify recurring failures and optimise pipeline scheduling."

# Q4: Any other important context? (optional)
additional_context: "Data covers November 2025 to March 2026. Jobs are triggered by schedules, file arrivals, table updates, or run continuously. Run outcomes include Succeeded, Failed, Cancelled, Timed Out, and Skipped. Job runs link to individual tasks, and tasks link back to their parent job definitions."

